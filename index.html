<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>65th Annual Lunch - 活動簽到與後台管理系統</title>
    
    <script>
        (function() {
            const expiryDate = new Date('2026-06-08T00:00:00+08:00').getTime();
            const now = new Date().getTime();

            if (now >= expiryDate) {
                document.addEventListener("DOMContentLoaded", function() {
                    document.body.innerHTML = `
                        <div style="display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #FDFCFB; font-family: 'Poppins', 'Noto Sans HK', sans-serif; text-align: center; flex-direction: column; padding: 20px;">
                            <h1 style="color: #800000; font-size: 2.5rem; margin-bottom: 10px;">系統已關閉<br>System Closed</h1>
                            <p style="color: #6B7280; font-size: 1.2rem;">65th Annual Lunch 簽到系統已於設定時間停止服務。<br>感謝您的參與！</p>
                        </div>
                    `;
                });
            }
        })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@400;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-burgundy: #800000;
            --primary-hover: #A52A2A;
            --accent-gold: #D4AF37;
            --bg-warm-gray: #FDFCFB;
            --card-bg: #FFFFFF;
            --text-main: #1F2937;
            --text-light: #6B7280;
            --success-green: #15803D;
            --danger-red: #DC2626;
            --radius-full: 9999px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --shadow-md: 0 10px 15px -3px rgba(128, 0, 0, 0.05), 0 4px 6px -2px rgba(128, 0, 0, 0.03);
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        body { font-family: 'Poppins', 'Noto Sans HK', sans-serif; background-color: var(--bg-warm-gray); margin: 0; padding: 0; color: var(--text-main); padding-bottom: 40px; }

        header { background-color: var(--card-bg); padding: 15px 25px; box-shadow: var(--shadow-md); border-bottom: 3px solid var(--accent-gold); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-area img { height: 55px; width: auto; border-radius: var(--radius-sm); }
        .logo-area span { font-weight: 700; font-size: 1.3rem; color: var(--primary-burgundy); letter-spacing: -0.5px; }

        .nav-btns { display: flex; gap: 10px; align-items: center; }
        .nav-btns-group { display: flex; gap: 5px; background-color: #F3F4F6; padding: 5px; border-radius: var(--radius-full); }
        .nav-btns button { padding: 10px 22px; border: none; border-radius: var(--radius-full); cursor: pointer; background-color: transparent; font-weight: 600; font-size: 0.95rem; color: var(--text-light); transition: all 0.3s ease; }
        .nav-btns button:hover:not(.active) { color: var(--primary-burgundy); }
        .nav-btns button.active { background-color: var(--primary-burgundy); color: white; box-shadow: 0 4px 6px rgba(128, 0, 0, 0.2); }
        
        /* 雲端同步按鈕 */
        .btn-sync { background-color: #E0E7FF !important; color: #4338CA !important; display: flex; align-items: center; gap: 5px; margin-right: 10px; }
        .btn-sync:hover { background-color: #C7D2FE !important; }
        .sync-icon { transition: transform 1s ease; }
        .syncing .sync-icon { transform: rotate(360deg); }

        .container { max-width: 1100px; margin: 30px auto; padding: 30px; background: var(--card-bg); border-radius: var(--radius-md); box-shadow: var(--shadow-md); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        h2 { font-weight: 700; color: var(--primary-burgundy); margin-top: 0; margin-bottom: 20px; border-left: 5px solid var(--accent-gold); padding-left: 15px; }
        h3 { font-weight: 600; color: var(--text-main); margin-top: 25px; }
        p { color: var(--text-light); line-height: 1.6; }
        
        .front-layout { display: flex; gap: 40px; align-items: flex-start; }
        .front-left { flex: 1.1; min-width: 0; }
        .front-right { flex: 1; min-width: 0; display: flex; flex-direction: column; }
        .search-wrapper { position: relative; width: 100%; margin-top: 10px; }
        
        input[type="text"], input[type="password"] { width: 100%; padding: 15px 20px; border: 2px solid #E5E7EB; border-radius: var(--radius-full); box-sizing: border-box; font-size: 1rem; transition: all 0.3s ease; background-color: #F9FAFB; }
        input[type="text"]:focus, input[type="password"]:focus { border-color: var(--accent-gold); background-color: white; outline: none; box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.1); }
        
        button.btn { background-color: var(--primary-burgundy); color: white; padding: 14px 28px; border: none; border-radius: var(--radius-full); cursor: pointer; width: 100%; font-size: 1.1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s ease; box-shadow: 0 4px 6px rgba(128, 0, 0, 0.2); }
        button.btn:hover { background-color: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 6px 12px rgba(128, 0, 0, 0.25); }
        button.btn-secondary { background-color: #E5E7EB; color: var(--text-main); box-shadow: none; }
        button.btn-secondary:hover { background-color: #D1D5DB; transform: translateY(0); box-shadow: none; }
        button.btn-logout { background-color: transparent; color: var(--text-light); border: 1px solid #D1D5DB; padding: 6px 15px; font-size: 0.85rem; border-radius: var(--radius-full); cursor: pointer; font-weight: 600; }
        button.btn-logout:hover { background-color: #F3F4F6; color: var(--danger-red); border-color: var(--danger-red); }

        .seating-plan { width: 100%; text-align: center; border: 2px dashed #D1D5DB; border-radius: var(--radius-md); padding: 15px; background-color: #F9FAFB; }
        .seating-plan img { max-width: 100%; height: auto; border-radius: var(--radius-sm); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .search-results-container { max-height: 380px; overflow-y: auto; border: none; border-radius: var(--radius-md); background: white; box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15); display: none; margin-top: 8px; position: absolute; width: 100%; top: 100%; left: 0; z-index: 50; }
        .search-result-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid #F3F4F6; }
        .search-result-item:hover { background-color: rgba(212, 175, 55, 0.05); }
        .guest-info strong { font-size: 1.15rem; color: var(--text-main); }
        .guest-info span { font-size: 0.95rem; color: var(--primary-burgundy); margin-left: 10px; font-weight: 600; }

        .btn-checkin { background-color: var(--primary-burgundy); color: white; border: none; padding: 9px 20px; border-radius: var(--radius-full); cursor: pointer; font-weight: 700; font-size: 0.9rem; transition: all 0.2s ease; }
        .btn-checkin:hover { background-color: var(--primary-hover); transform: scale(1.05); }
        .btn-signed { background-color: #E5E7EB; color: var(--text-light); border: none; padding: 9px 20px; border-radius: var(--radius-full); cursor: not-allowed; font-weight: 600; font-size: 0.9rem; }

        #signInAlert { padding: 18px; margin-top: 20px; border-radius: var(--radius-md); display: none; font-weight: 700; font-size: 1.15rem; text-align: center; box-shadow: var(--shadow-md); animation: slideInDown 0.4s ease; }
        
        .list-group { list-style: none; padding: 0; margin-top: 15px;}
        .list-group li { padding: 15px 20px; background-color: #F9FAFB; border: 1px solid #E5E7EB; margin-bottom: 8px; border-radius: var(--radius-sm); display: flex; justify-content: space-between; align-items: center; transition: all 0.2s ease; }
        .status-badge { background-color: var(--success-green); color: white; padding: 5px 12px; border-radius: var(--radius-full); font-size: 0.8rem; font-weight: 700; white-space: nowrap; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(4px); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: var(--card-bg); padding: 35px 30px; border-radius: var(--radius-md); width: 90%; max-width: 400px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); text-align: center; animation: slideInDown 0.3s ease; }
        .modal-error { color: var(--danger-red); font-size: 0.95rem; font-weight: 600; display: none; margin-bottom: 15px; }
        .modal-btns { display: flex; gap: 10px; margin-top: 25px; }

        /* Loader */
        .loader-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; display: none; }
        .spinner { border: 4px solid rgba(0,0,0,0.1); width: 40px; height: 40px; border-radius: 50%; border-left-color: var(--primary-burgundy); animation: spin 1s linear infinite; margin-bottom: 15px;}
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 850px) { .front-layout { flex-direction: column; gap: 25px; } }
        @media (max-width: 600px) {
            header { flex-direction: column; gap: 15px; padding: 15px; text-align: center;}
            .nav-btns { width: 100%; justify-content: center; flex-wrap: wrap; gap: 10px;}
            .container { padding: 20px; margin: 15px auto; width: calc(100% - 30px); }
            .list-group li { flex-direction: column; align-items: flex-start; gap: 8px; }
            .status-badge { align-self: flex-start; }
            .search-result-item { flex-direction: column; align-items: flex-start; gap: 12px; }
            .btn-checkin, .btn-signed { width: 100%; padding: 12px; }
        }
    </style>
</head>
<body>

    <div id="loader" class="loader-overlay">
        <div class="spinner"></div>
        <div style="font-weight: 600; color: var(--primary-burgundy);">正在與 Google Sheets 同步資料...</div>
    </div>

    <header>
        <div class="logo-area">
            <img src="Company logo.jpeg" alt="Company Logo" onerror="this.src='https://via.placeholder.com/150x50?text=Logo+NotFound'">
            <span>65th Annual Lunch</span>
        </div>
        <div class="nav-btns">
            <button id="btn-sync" class="btn-sync" onclick="fetchCloudData()">
                <span class="sync-icon">🔄</span> 更新資料
            </button>
            <div class="nav-btns-group">
                <button id="btn-front" class="active" onclick="switchTab('front')">首頁</button>
                <button id="btn-back" onclick="switchTab('back')">登入</button>
            </div>
        </div>
    </header>

    <div id="front" class="container tab-content active">
        <div class="front-layout">
            <div class="front-left">
                <h2 style="margin-top: 0;">座位表參考 (Seating Plan)</h2>
                <div class="seating-plan">
                    <img src="Seating plan.jpeg" alt="Seating Plan" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <span style="display:none; color: var(--danger-red); padding: 20px;">無法載入 Seating plan.jpeg</span>
                </div>
            </div>

            <div class="front-right">
                <h2 style="margin-top: 0;">來賓簽到 (Check-in)</h2>
                <p style="margin-bottom:8px;">接待員請輸入來賓姓名片段，下方將自動列出符合的名單：</p>
                
                <div class="search-wrapper">
                    <input type="text" id="searchInput" placeholder="輸入姓名尋找 (Chan, Lee, 陳大文...)" oninput="handleLiveSearch()" autocomplete="off" disabled>
                    <div id="searchResults" class="search-results-container"></div>
                </div>
                
                <div id="signInAlert"></div>
            </div>
        </div>
    </div>

    <div id="back" class="container tab-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin-bottom: 0;">1. 雲端資料庫連線</h2>
            <button class="btn-logout" onclick="handleLogout()">🔒 登出系統</button>
        </div>
        <div style="background-color: #ECFDF5; border: 1px solid #10B981; padding: 15px; border-radius: var(--radius-md); color: #065F46; font-weight: 600; margin-bottom: 30px; display: flex; align-items: center; gap: 10px;">
            <span style="font-size: 1.5rem;">✅</span> 系統已成功連線至 Google Sheets，資料將即時跨裝置同步。
        </div>
        
        <h2>2. 已簽到名單總覽</h2>
        <h3>簽到紀錄 (已簽到: <span id="signCount" style="color:var(--success-green); font-size:1.3rem;">0</span> 人)</h3>
        <ul id="signedInList" class="list-group"></ul>
    </div>

    <div id="loginModal" class="modal-overlay">
        <div class="modal-content">
            <h2 style="border:none; padding:0; text-align:center; font-size:1.5rem; margin-bottom:5px;">管理員登入</h2>
            <p style="font-size:0.9rem; color:var(--text-light); margin-bottom:20px;">請輸入帳號與密碼進入後台管理</p>
            <div id="loginError" class="modal-error">❌ 帳號或密碼錯誤！</div>
            <input type="text" id="adminUser" placeholder="帳號 (Username)" autocomplete="off">
            <input type="password" id="adminPass" placeholder="密碼 (Password)" onkeypress="if(event.key === 'Enter') handleLogin()">
            <div class="modal-btns">
                <button class="btn btn-secondary" onclick="closeLoginModal()">取消</button>
                <button class="btn" onclick="handleLogin()">登入</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // ⚠️ 請將下方的 URL 替換為你的 Web App URL
        // ==========================================
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycby2lELHtiwgW6rvQRn2dLDbJw4yzhb_WlJIOcFTVeM3adrd-I0nIKua1Ib9BXR99HcsgA/exec"; 
        
        let guestDatabase = []; 
        let isAdminLoggedIn = sessionStorage.getItem('adminAuth') === 'true';

        // 頁面載入時自動從 Google Sheets 抓資料
        window.onload = () => {
            if (WEB_APP_URL === "https://script.google.com/macros/s/AKfycby2lELHtiwgW6rvQRn2dLDbJw4yzhb_WlJIOcFTVeM3adrd-I0nIKua1Ib9BXR99HcsgA/exec") {
                alert("⚠️ 請注意：尚未填寫 WEB_APP_URL！系統無法連線至 Google Sheets。");
            } else {
                fetchCloudData();
            }
        };

        // 從 Google Sheets 抓取資料
        function fetchCloudData() {
            const syncBtn = document.getElementById('btn-sync');
            const loader = document.getElementById('loader');
            const searchInput = document.getElementById('searchInput');
            
            syncBtn.classList.add('syncing');
            loader.style.display = 'flex';
            searchInput.disabled = true;
            searchInput.placeholder = "正在載入雲端資料...";

            fetch(WEB_APP_URL)
                .then(response => response.json())
                .then(data => {
                    guestDatabase = data;
                    renderSignedInList(); // 更新後台名單
                    
                    loader.style.display = 'none';
                    syncBtn.classList.remove('syncing');
                    searchInput.disabled = false;
                    searchInput.placeholder = "輸入姓名尋找 (Chan, Lee, 陳大文...)";
                    
                    // 如果搜尋框有字，自動刷新搜尋結果
                    if(searchInput.value.trim() !== "") handleLiveSearch();
                })
                .catch(error => {
                    console.error("Error fetching data:", error);
                    alert("連線 Google Sheets 失敗，請檢查網路或網址。");
                    loader.style.display = 'none';
                    syncBtn.classList.remove('syncing');
                });
        }

        // 寫入資料到 Google Sheets
        function updateCloudData(engName, chiName, signInTime) {
            fetch(WEB_APP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({
                    engName: engName,
                    chiName: chiName,
                    time: signInTime
                })
            }).then(res => res.json())
              .then(data => {
                  if(!data.success) console.error("雲端更新失敗");
              }).catch(err => console.error("發送至雲端失敗:", err));
        }

        // --- 顯示邏輯與搜尋 (與之前大致相同) ---
        function getDisplayName(guest) {
            const eng = (guest['English Name'] || "").toString().trim();
            const chi = (guest['Chinese Name'] || "").toString().trim();
            if (eng !== "" && chi !== "") return `${eng} ${chi}`; 
            else if (eng !== "") return eng;             
            else if (chi !== "") return chi;             
            else return "無名氏";
        }

        function handleLiveSearch() {
            const input = document.getElementById('searchInput').value.trim().toLowerCase();
            const MathContainer = document.getElementById('searchResults');
            hideAlert(); 

            if (!input) {
                MathContainer.style.display = "none";
                MathContainer.innerHTML = "";
                return;
            }

            const matches = guestDatabase.filter(g => {
                const eng = (g['English Name'] || "").toString().toLowerCase();
                const chi = (g['Chinese Name'] || "").toString();
                return eng.includes(input) || chi.includes(input);
            });

            MathContainer.style.display = "block";
            MathContainer.innerHTML = "";

            if (matches.length === 0) {
                MathContainer.innerHTML = "<div style='padding:20px; color:#6B7280; text-align:center;'>找不到符合的來賓。</div>";
                return;
            }

            matches.forEach(guest => {
                const displayName = getDisplayName(guest);
                const tableNo = guest['Table No.'] || guest['Table Number'] || '未分配';
                
                // 檢查 Google Sheet 中的 SignInTime 欄位是否有值
                const alreadySigned = (guest['SignInTime'] && guest['SignInTime'].toString().trim() !== "");

                const itemDiv = document.createElement('div');
                itemDiv.className = 'search-result-item';
                
                let btnHtml = "";
                if (alreadySigned) {
                    btnHtml = `<button class="btn-signed" disabled>✓ 已簽到</button>`;
                } else {
                    btnHtml = `<button class="btn-checkin" onclick="signInSpecificGuest('${encodeURIComponent(guest['English Name'])}', '${encodeURIComponent(guest['Chinese Name'])}')">📝 簽到</button>`;
                }

                itemDiv.innerHTML = `
                    <div class="guest-info">
                        <strong>${displayName}</strong> 
                        <span>(桌號: ${tableNo})</span>
                    </div>
                    ${btnHtml}
                `;
                MathContainer.appendChild(itemDiv);
            });
        }

        function signInSpecificGuest(engNameEnc, chiNameEnc) {
            const engName = decodeURIComponent(engNameEnc);
            const chiName = decodeURIComponent(chiNameEnc);
            
            const guest = guestDatabase.find(g => 
                (g['English Name'] || "").toString() === engName && 
                (g['Chinese Name'] || "").toString() === chiName
            );

            if (guest) {
                const timeStr = new Date().toLocaleString('zh-HK');
                guest['SignInTime'] = timeStr; // 本地先更新狀態，讓畫面秒變
                
                // 非同步發送資料到 Google Sheets
                updateCloudData(guest['English Name'] || "", guest['Chinese Name'] || "", timeStr);
                
                const tableNo = guest['Table No.'] || guest['Table Number'] || '未分配';
                const displayName = getDisplayName(guest);

                showAlert(`✅ 簽到成功！歡迎 <strong>${displayName}</strong>，您的桌號是：<strong>${tableNo}</strong>`, "#15803D", "#D1FAE5");
                
                renderSignedInList();
                document.getElementById('searchInput').value = "";
                document.getElementById('searchResults').style.display = "none";
                document.getElementById('searchInput').focus();
            }
        }

        function renderSignedInList() {
            const list = document.getElementById('signedInList');
            list.innerHTML = "";
            
            // 篩選出已經簽到的來賓
            const signedInGuests = guestDatabase.filter(g => g['SignInTime'] && g['SignInTime'].toString().trim() !== "");
            
            // 依照簽到時間排序 (最新的在最上面)
            signedInGuests.sort((a, b) => new Date(b.SignInTime) - new Date(a.SignInTime));

            document.getElementById('signCount').textContent = signedInGuests.length;

            signedInGuests.forEach(guest => {
                const displayName = getDisplayName(guest);
                const tableNo = guest['Table No.'] || guest['Table Number'] || 'N/A';
                // 擷取時間部分 (e.g., 12:34:56)
                const timeStr = guest['SignInTime'].split(' ')[1] || guest['SignInTime'];

                const li = document.createElement('li');
                li.innerHTML = `
                    <span>
                        <strong style="font-size:1.1rem; color:#111827;">${displayName}</strong> 
                        <small style="color:#6B7280; margin-left: 10px; font-weight:600;">(桌號: ${tableNo})</small>
                    </span>
                    <span class="status-badge">已簽到 ${timeStr}</span>
                `;
                list.appendChild(li);
            });
        }

        // --- UI 控制邏輯 ---
        function switchTab(tabId) {
            if (tabId === 'back' && !isAdminLoggedIn) {
                document.getElementById('loginModal').style.display = 'flex';
                document.getElementById('adminUser').focus();
                return;
            }
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btns-group button').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('active');
            
            if(tabId === 'front') {
                hideAlert();
                document.getElementById('searchInput').value = "";
                document.getElementById('searchResults').style.display = "none";
                document.getElementById('searchInput').focus();
            }
        }

        function closeLoginModal() {
            document.getElementById('loginModal').style.display = 'none';
            document.getElementById('loginError').style.display = 'none';
            document.getElementById('adminUser').value = '';
            document.getElementById('adminPass').value = '';
        }

        function handleLogin() {
            const user = document.getElementById('adminUser').value.trim();
            const pass = document.getElementById('adminPass').value.trim();
            
            if (user === 'admin' && pass === 'Abcd1234') {
                isAdminLoggedIn = true;
                sessionStorage.setItem('adminAuth', 'true');
                closeLoginModal();
                switchTab('back');
            } else {
                document.getElementById('loginError').style.display = 'block';
                document.getElementById('adminPass').value = '';
                document.getElementById('adminPass').focus();
            }
        }

        function handleLogout() {
            isAdminLoggedIn = false;
            sessionStorage.removeItem('adminAuth');
            switchTab('front');
            alert("已登出系統，系統已鎖定。");
        }

        function showAlert(msg, color, bgColor) {
            const alertDiv = document.getElementById('signInAlert');
            alertDiv.innerHTML = msg;
            alertDiv.style.color = color;
            alertDiv.style.backgroundColor = bgColor;
            alertDiv.style.display = "block";
        }
        function hideAlert() { document.getElementById('signInAlert').style.display = "none"; }
    </script>
</body>
</html>
